<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ご利用規約 | 家事代行サービス おざ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif; background: #FDFAF6; color: #3A3028; }

.p { max-width: 640px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

.page-title { font-size: 20px; font-weight: 500; color: #3A3028; margin-bottom: 0.5rem; }
.page-sub { font-size: 13px; color: #A8967E; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid #E8E0D4; }

.sec { padding: 2rem 0; border-bottom: 1px solid #E8E0D4; }
.sec:last-of-type { border-bottom: none; }
.sec-label { font-size: 15px; letter-spacing: 0.1em; color: #A8967E; margin-bottom: 1.2rem; padding-left: 10px; border-left: 3px solid #A8967E; }

.terms-item { display: flex; flex-direction: column; gap: 0.8rem; }
.terms-row { font-size: 13px; color: #7A6E63; line-height: 1.9; padding: 0.8rem 0; border-bottom: 1px solid #E8E0D4; }
.terms-row:last-child { border-bottom: none; }
.terms-row strong { font-weight: 500; color: #3A3028; display: block; margin-bottom: 0.3rem; }

.back-link { display: inline-block; margin-top: 2rem; font-size: 13px; color: #A8967E; text-decoration: none; border-bottom: 1px solid #A8967E; }
</style>
</head>
<body>
<div class="p">

  <div class="page-title">ご利用規約</div>
  <div class="page-sub">家事代行サービス おざ</div>

  <div class="sec">
    <div class="sec-label">1. キャンセルについて</div>
    <div class="terms-item">
      <div class="terms-row">
        <strong>スポットの場合</strong>
        前日まで：キャンセル料なし<br>
        当日：料金の100%またはご都合の良い日への振替
      </div>
      <div class="terms-row">
        <strong>定期の場合</strong>
        ご都合の良い日への振替
      </div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-label">2. 損害・賠償について</div>
    <div class="terms-item">
      <div class="terms-row">
        作業中の損害については、当事業者が加入する賠償責任補償の範囲内で対応いたします。
      </div>
      <div class="terms-row">
        経年劣化・もともとの破損・貴重品など、補償対象外となる場合がございます。
      </div>
      <div class="terms-row">
        貴重品・壊れやすいものは事前にお知らせください。
      </div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-label">3. 個人情報について</div>
    <div class="terms-item">
      <div class="terms-row">
        お預かりした個人情報はサービス提供のみに使用し、第三者への提供は行いません。
      </div>
    </div>
  </div>

  <a class="back-link" href="index.html">← トップページへ戻る</a>

</div>
</body>
</html>
